name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-test:
    name: Ubuntu 26.04 Qt6/KF6 Docker build and tests
    runs-on: ubuntu-24.04

    steps:
      - name: Check out sources
        uses: actions/checkout@v4

      - name: Build CI container
        run: docker build -f .github/ci/Dockerfile -t kate-copilot-ci:ubuntu-26.04 .

      - name: Configure, build, and test inside container
        env:
          BUILD_DIR: /tmp/kate-copilot-build
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e BUILD_DIR="$BUILD_DIR" \
            -e QT_QPA_PLATFORM=offscreen \
            -e KDE_DEBUG=1 \
            kate-copilot-ci:ubuntu-26.04 \
            bash -lc '
              set -euxo pipefail
              cmake -S . -B "$BUILD_DIR" -GNinja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
              cmake --build "$BUILD_DIR" -j"$(nproc)"
              ctest --test-dir "$BUILD_DIR" --output-on-failure --timeout 120
            '
